name: 'ECR Login via OIDC'
description: 'Configures AWS credentials via OIDC, assumes ECR push role, and logs into private and/or public ECR registries.'

inputs:
  aws-oidc-role:
    description: 'ARN of the IAM role to assume via OIDC'
    required: true
  aws-ecr-login-role:
    description: 'ARN of the IAM role to assume for ECR push (role chaining)'
    required: true
  aws-region:
    description: 'AWS region for ECR'
    required: false
    default: 'us-east-1'
  login-public-ecr:
    description: 'Whether to also log into ECR Public (true/false)'
    required: false
    default: 'false'

outputs:
  ecr-registry:
    description: 'The private ECR registry URI'
    value: ${{ steps.login-ecr.outputs.registry }}
  ecr-public-registry:
    description: 'The public ECR registry URI (only set when login-public-ecr is true)'
    value: ${{ steps.login-ecr-public.outputs.registry }}

runs:
  using: 'composite'
  steps:
    # Step 1: Authenticate via OIDC
    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws-oidc-role }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: gha-ecr-oidc-${{ github.run_id }}-${{ github.run_attempt }}
        role-skip-session-tagging: false

    # Step 2: Role chain into the ECR push role
    - name: Assume ECR push role with tags
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws-ecr-login-role }}
        aws-region: ${{ inputs.aws-region }}
        role-chaining: true
        role-session-name: ecr-push-${{ github.run_id }}-${{ github.run_attempt }}
        role-skip-session-tagging: false

    # Step 3: Login to private ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Step 4: Conditionally login to public ECR
    - name: Login to Amazon ECR Public
      if: inputs.login-public-ecr == 'true'
      id: login-ecr-public
      uses: aws-actions/amazon-ecr-login@v2
      with:
        registry-type: public

    # Create repository if repository doesn't exist
    - name: Ensure ECR repository exists with correct tag
      shell: bash
      run: |
        REPO_NAME="${{ inputs.ecr-repository }}"
        REGION="${{ inputs.aws-region }}"
        REPO_TAG="${{ github.repository }}"
        ACCOUNT_ID="<>"
        REPO_ARN="arn:aws:ecr:${REGION}:${ACCOUNT_ID}:repository/${REPO_NAME}"

        if aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$REGION" 2>/dev/null; then
          # Repo exists - verify it has the Repository tag
          TAG_VALUE=$(aws ecr list-tags-for-resource --resource-arn "$REPO_ARN" --region "$REGION" \
            | jq -r '.tags[] | select(.Key=="Repository") | .Value')
          if [ -z "$TAG_VALUE" ]; then
            echo "::error::ECR repository '${REPO_NAME}' exists but has no 'Repository' tag. Cannot push."
            exit 1
          fi
          echo "Repository exists with Repository tag: ${TAG_VALUE}"
        else
          # Repo doesn't exist - create with required tag
          echo "Creating ECR repository '${REPO_NAME}' with Repository=${REPO_TAG}"
          aws ecr create-repository \
            --repository-name "$REPO_NAME" \
            --region "$REGION" \
            --tags "Key=Repository,Value=${REPO_TAG}"
        fi
