name: 'ECR Login via OIDC'
description: 'Configures AWS credentials via OIDC, assumes ECR push role, and logs into private and/or public ECR registries.'

inputs:
  login-public-ecr:
    description: 'Whether to also log into ECR Public (true/false)'
    required: false
    default: 'false'

outputs:
  ecr-registry:
    description: 'The private ECR registry URI'
    value: ${{ steps.login-ecr.outputs.registry }}
  ecr-public-registry:
    description: 'The public ECR registry URI (only set when login-public-ecr is true)'
    value: ${{ steps.login-ecr-public.outputs.registry }}

runs:
  using: 'composite'
  steps:
    # Step 1: Authenticate via OIDC
    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: "arn:aws:iam::746476062914:role/github-actions-ecr-policy"
        aws-region: "us-east-1"
        role-session-name: gha-ecr-oidc-${{ github.run_id }}-${{ github.run_attempt }}
        role-skip-session-tagging: false

    # Step 2: Role chain into the ECR push role
    - name: Assume ECR push role with tags
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: "arn:aws:iam::746476062914:role/github-actions-ecr-push"
        aws-region: "us-east-1"
        role-chaining: true
        role-session-name: ecr-push-${{ github.run_id }}-${{ github.run_attempt }}
        role-skip-session-tagging: false

    # Step 3: Login to private ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Step 4: Conditionally login to public ECR
    - name: Login to Amazon ECR Public
      if: inputs.login-public-ecr == 'true'
      id: login-ecr-public
      uses: aws-actions/amazon-ecr-login@v2
      with:
        registry-type: public

    # Install ecr-push wrapper script onto PATH
    - name: Install ecr-push helper
      shell: bash
      env:
        RUNNER_TEMP: ${{ runner.temp }}
        AWS_REGION_INPUT: "us-east-1"
        GITHUB_REPO: ${{ github.repository }}
      run: |
        SCRIPT_DIR="${RUNNER_TEMP}/ecr-push-bin"
        mkdir -p "$SCRIPT_DIR"
        cat > "$SCRIPT_DIR/ecr-push" << 'SCRIPT'
        #!/usr/bin/env bash
        set -euo pipefail

        if [ $# -ne 1 ]; then
          echo "Usage: ecr-push <image:tag>"
          exit 1
        fi

        IMAGE="$1"
        REGION="${ECR_PUSH_REGION}"
        REPO_TAG="${ECR_PUSH_REPO_TAG}"

        # Extract repo name from image URI: <account>.dkr.ecr.<region>.amazonaws.com/<repo-name>:<tag>
        REPO_NAME=$(echo "$IMAGE" | sed 's|^[^/]*/||; s|:[^:]*$||')

        # Check if repo exists, create if not
        if aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$REGION" 2>/dev/null; then
          echo "ECR repository '${REPO_NAME}' already exists"
          # Check if Repository tag exists, add it if missing
          EXISTING_TAGS=$(aws ecr list-tags-for-resource \
            --resource-arn "$(aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$REGION" --query 'repositories[0].repositoryArn' --output text)" \
            --region "$REGION" --query 'tags[?Key==`Repository`].Value' --output text 2>/dev/null || true)
          if [ -z "$EXISTING_TAGS" ]; then
            echo "Adding Repository tag to '${REPO_NAME}'"
            aws ecr tag-resource \
              --resource-arn "$(aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$REGION" --query 'repositories[0].repositoryArn' --output text)" \
              --region "$REGION" \
              --tags "Key=Repository,Value=${REPO_TAG}"
          fi
        elif [[ "$REPO_NAME" =~ ^(dev|stg|prd)/ ]]; then
          echo "Creating ECR repository '${REPO_NAME}' with Repository=${REPO_TAG}"
          aws ecr create-repository \
            --repository-name "$REPO_NAME" \
            --region "$REGION" \
            --tags "Key=Repository,Value=${REPO_TAG}"
        else
          echo "::warning::Repository '${REPO_NAME}' does not exist and is not under dev/, stg/, or prd/. Skipping creation — these repositories must be managed via Terraform."
        fi

        echo "Attempting to push image to repository '${REPO_NAME}'"
        docker push "$IMAGE"
        SCRIPT
        chmod +x "$SCRIPT_DIR/ecr-push"
        echo "$SCRIPT_DIR" >> "$GITHUB_PATH"
        echo "ECR_PUSH_REGION=${AWS_REGION_INPUT}" >> "$GITHUB_ENV"
        echo "ECR_PUSH_REPO_TAG=${GITHUB_REPO}" >> "$GITHUB_ENV"
